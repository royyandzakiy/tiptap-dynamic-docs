<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiptap Minimal</title>
  </head>
  <body>
    <div id="app">
      <div id="empty-counter" class="counter"></div>
      <div class="pager">
        <button id="page-prev" title="Previous pages">◀</button>
        <span id="page-label">Pages 1–2</span>
        <button id="page-next" title="Next pages">▶</button>
      </div>
      <div class="page-area">
        <div id="editor"></div>
        <div class="page-furniture" aria-hidden="true">
          <div class="pf pf-top pf-left">Header</div>
          <div class="pf pf-top pf-right">Header</div>
          <div class="pf pf-bottom pf-left">Page 1</div>
          <div class="pf pf-bottom pf-right">Page 2</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
